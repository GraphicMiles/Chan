# Railway/Render/Fly build config — force the platform to build and run the
# resolver worker, NOT the repo-root Vite frontend. PaaS auto-detection runs
# 'npm run build' on the root package.json otherwise (serves dist/ = wrong app).
#
# Read by Nixpacks on Railway and takes precedence over auto-detection.
# (Vercel ignores nixpacks.toml and Dockerfiles — it uses vercel.json instead,
#  so the frontend/SSR deploy there is unaffected.)

[build]
# Install worker deps (cheerio for Nkiri HTML parsing)
cmds = ['cd o2tv-worker && npm install --omit=dev --no-audit --no-fund']

[start]
# Run the worker server. PORT is injected by Railway at runtime.
cmd = "node o2tv-worker/server.js"
